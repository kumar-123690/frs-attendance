{% extends "base.html" %}
{% block body %}
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">

  <div style="margin-bottom:32px;text-align:center;">
    <div style="font-size:52px;margin-bottom:8px;">🎓</div>
    <div style="font-size:22px;font-weight:700;">FRS Attendance</div>
    <div style="font-size:14px;color:var(--muted);margin-top:4px;">Faculty Login</div>
  </div>

  {% with messages = get_flashed_messages() %}
  {% if messages %}
  <div class="flash flash-error" style="width:100%;max-width:400px;">{{ messages[0] }}</div>
  {% endif %}
  {% endwith %}

  <form method="POST" style="width:100%;max-width:400px;">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" style="margin-top:8px;">Login →</button>
  </form>

  <p style="font-size:13px;color:var(--muted);margin-top:24px;">
    Admin? <a href="/admin/login" style="color:var(--accent2);">Admin Panel →</a>
  </p>
</div>
{% endblock %}
