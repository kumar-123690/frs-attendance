{% extends "base.html" %}
{% block body %}
<div class="nav">
  <a href="/students" class="nav-btn">← Back</a>
  <div class="nav-title">Add Student</div>
  <div></div>
</div>
<div class="main">
  {% with messages = get_flashed_messages() %}
  {% if messages %}
  <div class="flash {{ 'flash-error' if 'No face' in messages[0] or 'exists' in messages[0] else '' }}">
    {{ messages[0] }}
  </div>
  {% endif %}
  {% endwith %}
  <form method="POST" action="/register_student">
    <div class="form-group">
      <label>Student Full Name</label>
      <input type="text" name="name" placeholder="e.g. Ravi Kumar" required>
    </div>
    <div class="form-group">
      <label>Roll Number</label>
      <input type="text" name="roll_no" placeholder="e.g. 22CS045" required>
    </div>
    <div class="form-group">
      <label>Face Photo</label>

      <!-- Camera container -->
      <div style="position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3;">
        <video id="reg-video" autoplay playsinline muted
               style="width:100%;height:100%;object-fit:cover;display:block;"></video>
        <img id="captured-img" style="width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;" />

        <!-- Switch Camera Button (top right) -->
        <button type="button" id="switch-btn" onclick="switchCamera()"
                style="position:absolute;top:10px;right:10px;
                       background:rgba(0,0,0,0.55);border:none;border-radius:50%;
                       width:40px;height:40px;font-size:18px;cursor:pointer;display:none;">
          🔄
        </button>

        <!-- Loading indicator -->
        <div id="cam-loading" style="position:absolute;inset:0;display:flex;align-items:center;
             justify-content:center;background:#000;color:#94a3b8;font-size:14px;">
          ⏳ Starting camera...
        </div>
      </div>

      <input type="hidden" name="image_data" id="image_data">
    </div>

    <!-- Buttons -->
    <button type="button" class="btn btn-primary" id="capture-btn"
            onclick="capture()" style="display:none;">
      📸 Capture Photo
    </button>
    <button type="button" class="btn btn-outline" id="retake-btn"
            onclick="retake()" style="display:none;">
      🔄 Retake
    </button>
    <button type="submit" class="btn btn-green" id="save-btn"
            style="display:none;margin-top:4px;">
      ✅ Save Student
    </button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
let stream = null;
let facingMode = 'user'; // start with front camera

// Auto start camera on page load
window.addEventListener('load', () => {
  startCam();
});

function startCam(){
  // stop existing stream
  if(stream){ stream.getTracks().forEach(t => t.stop()); }

  document.getElementById('cam-loading').style.display = 'flex';
  document.getElementById('switch-btn').style.display = 'none';
  document.getElementById('capture-btn').style.display = 'none';

  const constraints = {
    video: {
      facingMode: { ideal: facingMode },
      width: { ideal: 1280 },
      height: { ideal: 960 }
    }
  };

  navigator.mediaDevices.getUserMedia(constraints)
  .then(s => {
    stream = s;
    const video = document.getElementById('reg-video');
    video.srcObject = s;
    video.style.display = 'block';
    document.getElementById('captured-img').style.display = 'none';
    document.getElementById('cam-loading').style.display = 'none';
    document.getElementById('switch-btn').style.display = 'block';
    document.getElementById('capture-btn').style.display = 'block';
    document.getElementById('retake-btn').style.display = 'none';
    document.getElementById('save-btn').style.display = 'none';
    document.getElementById('image_data').value = '';
  })
  .catch(err => {
    // fallback to any camera
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      const video = document.getElementById('reg-video');
      video.srcObject = s;
      video.style.display = 'block';
      document.getElementById('cam-loading').style.display = 'none';
      document.getElementById('switch-btn').style.display = 'block';
      document.getElementById('capture-btn').style.display = 'block';
      document.getElementById('image_data').value = '';
    })
    .catch(e => {
      document.getElementById('cam-loading').innerHTML = '❌ Camera error. Open via https://';
    });
  });
}

function switchCamera(){
  facingMode = (facingMode === 'user') ? 'environment' : 'user';
  startCam();
}

function capture(){
  const v = document.getElementById('reg-video');
  const c = document.createElement('canvas');
  c.width = v.videoWidth || 640;
  c.height = v.videoHeight || 480;
  c.getContext('2d').drawImage(v, 0, 0);
  const data = c.toDataURL('image/jpeg', 0.9);

  document.getElementById('image_data').value = data;
  document.getElementById('captured-img').src = data;
  document.getElementById('captured-img').style.display = 'block';
  document.getElementById('reg-video').style.display = 'none';
  document.getElementById('cam-loading').style.display = 'none';

  // stop camera after capture
  if(stream){ stream.getTracks().forEach(t => t.stop()); }

  document.getElementById('switch-btn').style.display = 'none';
  document.getElementById('capture-btn').style.display = 'none';
  document.getElementById('retake-btn').style.display = 'block';
  document.getElementById('save-btn').style.display = 'block';
}

function retake(){
  document.getElementById('image_data').value = '';
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('retake-btn').style.display = 'none';
  startCam();
}
</script>
{% endblock %}
