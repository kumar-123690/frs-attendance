<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FRS Attendance</title>
<link rel="manifest" href="/static/manifest.json">
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --card: #16213e;
  --accent: #4f46e5;
  --accent2: #06b6d4;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.08);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
body { display:flex; flex-direction:column; min-height:100vh; }

/* NAV */
.nav { background:var(--surface); padding:14px 20px; display:flex; align-items:center;
       justify-content:space-between; border-bottom:1px solid var(--border);
       position:sticky; top:0; z-index:100; }
.nav-title { font-size:17px; font-weight:600; }
.nav-sub { font-size:12px; color:var(--muted); }
.nav-right { display:flex; gap:10px; }
.nav-btn { background:var(--border); border:none; color:var(--text); padding:8px 14px;
           border-radius:10px; font-size:13px; cursor:pointer; text-decoration:none; }

/* MAIN */
.main { flex:1; padding:16px; max-width:600px; margin:0 auto; width:100%; }

/* CARDS */
.card { background:var(--card); border-radius:var(--radius); padding:18px;
        border:1px solid var(--border); margin-bottom:14px; }
.card-title { font-size:13px; color:var(--muted); margin-bottom:4px; }
.card-value { font-size:28px; font-weight:700; }

/* STATS GRID */
.stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
.stat { background:var(--card); border-radius:14px; padding:14px 10px; text-align:center;
        border:1px solid var(--border); }
.stat-num { font-size:26px; font-weight:700; }
.stat-label { font-size:11px; color:var(--muted); margin-top:2px; }
.green-text { color:var(--green); }
.red-text { color:var(--red); }
.blue-text { color:var(--accent2); }

/* BUTTONS */
.btn { display:block; width:100%; padding:16px; border:none; border-radius:14px;
       font-size:16px; font-weight:600; cursor:pointer; text-align:center;
       text-decoration:none; transition:opacity 0.2s; margin-bottom:10px; }
.btn:active { opacity:0.8; transform:scale(0.98); }
.btn-primary { background:linear-gradient(135deg,var(--accent),#7c3aed); color:white; }
.btn-scan { background:linear-gradient(135deg,#06b6d4,#0891b2); color:white; font-size:18px; padding:20px; }
.btn-green { background:linear-gradient(135deg,var(--green),#059669); color:white; }
.btn-red { background:var(--red); color:white; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-sm { padding:10px 16px; font-size:14px; width:auto; display:inline-block; margin:0; }

/* FORM */
.form-group { margin-bottom:14px; }
label { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
input[type=text], input[type=password], input[type=date] {
  width:100%; padding:14px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:12px; color:var(--text); font-size:15px; outline:none; }
input:focus { border-color:var(--accent); }

/* FLASH */
.flash { background:rgba(16,185,129,0.15); border:1px solid var(--green); color:var(--green);
         padding:12px 16px; border-radius:12px; margin-bottom:14px; font-size:14px; }
.flash-error { background:rgba(239,68,68,0.15); border-color:var(--red); color:var(--red); }

/* LIST */
.list-item { background:var(--card); border-radius:14px; padding:14px 16px;
             display:flex; align-items:center; gap:12px; margin-bottom:10px;
             border:1px solid var(--border); }
.avatar { width:42px; height:42px; border-radius:50%; background:var(--accent);
          display:flex; align-items:center; justify-content:center;
          font-weight:700; font-size:16px; flex-shrink:0; }
.list-name { font-size:15px; font-weight:500; }
.list-sub { font-size:12px; color:var(--muted); margin-top:2px; }
.badge { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-present { background:rgba(16,185,129,0.2); color:var(--green); }
.badge-absent { background:rgba(239,68,68,0.15); color:var(--red); }
.badge-orange { background:rgba(245,158,11,0.2); color:var(--orange); }
.ml-auto { margin-left:auto; }

/* BOTTOM NAV */
.bottom-nav { background:var(--surface); border-top:1px solid var(--border);
              display:flex; justify-content:space-around; padding:10px 0 16px;
              position:sticky; bottom:0; z-index:100; }
.bnav-item { display:flex; flex-direction:column; align-items:center; gap:3px;
             color:var(--muted); font-size:11px; text-decoration:none; padding:4px 16px; }
.bnav-item.active { color:var(--accent2); }
.bnav-icon { font-size:22px; }

/* SCAN PAGE */
.scan-container { position:relative; border-radius:var(--radius); overflow:hidden;
                  aspect-ratio:4/3; background:#000; margin-bottom:14px; }
#video { width:100%; height:100%; object-fit:cover; }
.scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.scan-box { width:200px; height:200px; border:3px solid var(--accent2);
            border-radius:20px; box-shadow:0 0 0 2000px rgba(0,0,0,0.5); }
.scan-result { background:var(--card); border-radius:var(--radius); padding:20px;
               text-align:center; margin-bottom:14px; display:none; border:1px solid var(--border); }
.scan-name { font-size:24px; font-weight:700; margin:8px 0 4px; }
.scan-roll { color:var(--muted); font-size:14px; }
.scan-conf { font-size:13px; color:var(--accent2); margin-top:4px; }
.confirm-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }

/* SECTION HEADER */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.section-title { font-size:16px; font-weight:600; }

/* STATUS */
.loc-status { padding:10px 14px; border-radius:12px; font-size:13px;
              display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.loc-ok { background:rgba(16,185,129,0.15); color:var(--green); border:1px solid rgba(16,185,129,0.3); }
.loc-fail { background:rgba(239,68,68,0.1); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
.loc-check { background:rgba(245,158,11,0.1); color:var(--orange); border:1px solid rgba(245,158,11,0.3); }

/* VIDEO register */
#reg-video { width:100%; border-radius:14px; aspect-ratio:4/3; object-fit:cover; background:#000; }
.captured-img { width:100%; border-radius:14px; display:none; }
</style>
</head>
<body>
{% block body %}{% endblock %}

<script>
// PWA install
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
